services:

  postgres:
    image: postgres:16

    container_name: house_price_postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .

    container_name: house_price_api

    restart: unless-stopped

    env_file:
      - .env

    depends_on:
      - postgres

    ports:
      - "8000:8000"

volumes:
  postgres_data:

    

